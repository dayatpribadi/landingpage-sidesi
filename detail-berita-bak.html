<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Berita - SIDESI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                    colors: {
                        brand: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            300: '#f9a8d4',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d',
                            800: '#9d174d',
                            900: '#831843'
                        },
                        sky: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7'
                        },
                        dark: {
                            900: '#111111',
                            950: '#0a0a0a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(236, 72, 153, 0.12), transparent 28%),
                linear-gradient(180deg, #fff 0%, #f8fafc 100%);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #ec4899;
            border-radius: 999px;
        }

        .news-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.12) 0%, rgba(17, 24, 39, 0.62) 100%);
        }

        .prose-copy p+p {
            margin-top: 1rem;
        }
    </style>
</head>

<body class="text-neutral-800">
    <header class="sticky top-0 z-50 border-b border-white/60 bg-white/85 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 lg:px-12 h-20 flex items-center justify-between gap-4">
            <a href="index.html"
                class="inline-flex items-center gap-3 text-neutral-900 hover:text-brand-600 transition-colors">
                <div
                    class="w-11 h-11 rounded-2xl bg-gradient-to-br from-brand-500 via-brand-600 to-sky-500 flex items-center justify-center shadow-lg shadow-brand-500/25">
                    <span class="iconify text-white text-xl" data-icon="mdi:newspaper-variant-outline"></span>
                </div>
                <div>
                    <p class="font-bold leading-none">SIDESI</p>
                    <p class="text-xs text-neutral-500 mt-1">Detail Berita Desa</p>
                </div>
            </a>
            <a href="index.html#berita"
                class="inline-flex items-center gap-2 rounded-full border border-neutral-200 px-4 py-2 text-sm font-semibold text-neutral-700 hover:border-brand-300 hover:text-brand-600 transition-colors">
                <span class="iconify" data-icon="mdi:arrow-left"></span>
                Kembali ke Berita
            </a>
        </div>
    </header>

    <main>
        <section class="pt-10 pb-8 lg:pt-14">
            <div class="max-w-6xl mx-auto px-6 lg:px-12">
                <nav class="text-sm text-neutral-400 mb-6">
                    <a href="index.html" class="hover:text-brand-600 transition-colors">Beranda</a>
                    <span class="mx-2">/</span>
                    <a href="index.html#berita" class="hover:text-brand-600 transition-colors">Berita Desa</a>
                    <span class="mx-2">/</span>
                    <span id="breadcrumbTitle" class="text-neutral-500">Detail</span>
                </nav>

                <div id="newsDetail"></div>
            </div>
        </section>
    </main>

    <script src="assets/js/news-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const newsData = window.newsData || [];
            const params = new URLSearchParams(window.location.search);
            const newsId = Number(params.get('id'));
            const currentNews = newsData.find(item => item.id === newsId) || newsData[0];
            const relatedNews = newsData.filter(item => item.id !== currentNews.id).slice(0, 3);
            const breadcrumbTitle = document.getElementById('breadcrumbTitle');
            const detailContainer = document.getElementById('newsDetail');

            const categoryLabel = (category) => {
                const labels = {
                    pembangunan: 'Pembangunan',
                    pelayanan: 'Pelayanan',
                    kegiatan: 'Kegiatan'
                };
                return labels[category] || category;
            };

            document.title = `${currentNews.title} - SIDESI`;
            breadcrumbTitle.textContent = currentNews.title;

            detailContainer.innerHTML = `
                <article class="grid lg:grid-cols-[minmax(0,1fr)_320px] gap-8 lg:gap-10 items-start">
                    <div>
                        <div class="relative overflow-hidden rounded-[2rem] shadow-2xl shadow-neutral-900/10 news-hero mb-8">
                            <img src="${currentNews.img}" alt="${currentNews.title}" class="w-full h-[280px] sm:h-[360px] lg:h-[440px] object-cover">
                            <div class="absolute inset-x-0 bottom-0 p-6 sm:p-8 z-10 text-white">
                                <span class="inline-flex rounded-full bg-white/90 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.24em] text-brand-600">${categoryLabel(currentNews.category)}</span>
                                <h1 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight max-w-4xl">${currentNews.title}</h1>
                                <div class="mt-4 flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-white/85">
                                    <span class="inline-flex items-center gap-2"><span class="iconify" data-icon="mdi:calendar-outline"></span>${currentNews.date}</span>
                                    <span class="inline-flex items-center gap-2"><span class="iconify" data-icon="mdi:map-marker-outline"></span>${currentNews.desa}</span>
                                    <span class="inline-flex items-center gap-2"><span class="iconify" data-icon="mdi:clock-time-four-outline"></span>${currentNews.readTime}</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-[2rem] border border-white/80 shadow-xl shadow-neutral-900/5 p-6 sm:p-8 lg:p-10">
                            <div class="flex flex-wrap items-center gap-3 text-sm text-neutral-500 mb-6">
                                <span class="inline-flex items-center gap-2 rounded-full bg-neutral-100 px-4 py-2 text-neutral-700">
                                    <span class="iconify text-brand-500" data-icon="mdi:account-circle-outline"></span>
                                    ${currentNews.author}
                                </span>
                                <span class="inline-flex items-center gap-2 rounded-full bg-brand-50 px-4 py-2 text-brand-700">
                                    <span class="iconify" data-icon="mdi:newspaper-variant-outline"></span>
                                    Berita Desa
                                </span>
                            </div>
                            <div class="prose-copy text-[15px] sm:text-base leading-8 text-neutral-600">
                                ${currentNews.content.map(paragraph => `<p>${paragraph}</p>`).join('')}
                            </div>
                        </div>
                    </div>

                    <aside class="space-y-6 lg:sticky lg:top-28">
                        <div class="bg-white rounded-[2rem] border border-white/80 shadow-xl shadow-neutral-900/5 p-6">
                            <h2 class="text-lg font-bold text-neutral-900">Ringkasan</h2>
                            <p class="mt-3 text-sm leading-7 text-neutral-500">${currentNews.excerpt}</p>
                            <div class="mt-5 pt-5 border-t border-neutral-100 space-y-3 text-sm text-neutral-600">
                                <div class="flex items-center justify-between gap-4">
                                    <span>Kategori</span>
                                    <span class="font-semibold text-neutral-900">${categoryLabel(currentNews.category)}</span>
                                </div>
                                <div class="flex items-center justify-between gap-4">
                                    <span>Desa</span>
                                    <span class="font-semibold text-neutral-900 text-right">${currentNews.desa}</span>
                                </div>
                                <div class="flex items-center justify-between gap-4">
                                    <span>Durasi baca</span>
                                    <span class="font-semibold text-neutral-900">${currentNews.readTime}</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gradient-to-br from-dark-950 via-dark-900 to-neutral-900 text-white rounded-[2rem] p-6">
                            <p class="text-xs font-semibold uppercase tracking-[0.28em] text-brand-300">Jelajahi</p>
                            <h2 class="mt-3 text-xl font-bold">Berita lainnya</h2>
                            <div class="mt-5 space-y-4">
                                ${relatedNews.map(item => `
                                    <a href="detail-berita.html?id=${item.id}" class="block rounded-2xl border border-white/10 bg-white/5 p-4 hover:border-brand-400/50 hover:bg-white/10 transition-colors">
                                        <p class="text-[11px] uppercase tracking-[0.22em] text-brand-200">${categoryLabel(item.category)}</p>
                                        <h3 class="mt-2 text-sm font-semibold leading-6">${item.title}</h3>
                                        <p class="mt-2 text-xs text-white/65">${item.date}</p>
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    </aside>
                </article>
            `;
        });
    </script>
</body>

</html>
